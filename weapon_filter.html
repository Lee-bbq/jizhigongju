<body>
    <div class="container">
        <header>
            <h1>⚔️ 武器筛选器</h1>
        </header>
        
        <div class="main-layout">
            <!-- 左侧筛选面板 -->
            <div class="filter-panel">
                <!-- 模式切换 -->
                <div class="filter-card compact-filter">
                    <div class="search-mode-row">
                        <label class="switch-label">
                            <input type="checkbox" id="searchModeSwitch" class="switch-input" onchange="toggleSearchMode()">
                            <span class="switch-slider"></span>
                            <span class="switch-text">刻写</span>
                        </label>
                        <div class="search-input-container" id="searchInputContainer">
                            <input type="text" class="search-input" id="searchInput" placeholder="输入武器名称搜索..." oninput="handleSearchInput()">
                        </div>
                    </div>
                </div>
                
                <!-- 基础属性 -->
                <div class="filter-card compact-filter">
                    <div class="secondary-title">
                        <span>基础属性</span>
                        <span class="badge" id="mainBadge">已选 0/3</span>
                    </div>
                    <div class="main-attrs" id="mainAttrs"></div>
                </div>
                
                <!-- 附加属性 + 技能属性 同行 -->
                <div class="secondary-skill-row">
                    <div class="filter-card compact-filter" id="secondaryFilter">
                        <div class="secondary-title">
                            <span>附加属性</span>
                            <span class="secondary-badge" id="secondaryBadge">已选 0/1</span>
                        </div>
                        <div class="secondary-options" id="secondaryAttrs"></div>
                    </div>
                    <div class="filter-card compact-filter" id="skillFilter">
                        <div class="secondary-title">
                            <span>技能属性</span>
                            <span class="skill-badge" id="skillBadge">已选 0/1</span>
                        </div>
                        <div class="skill-options" id="skillAttrs"></div>
                    </div>
                </div>
                
                <!-- 武器地区 + 星级 不同行 -->
  
                    <div class="filter-card compact-filter">
                        <div class="filter-title">武器地区</div>
                        <div class="star-filter-options" id="regionFilter"></div>
                    </div>
                    <div class="filter-card compact-filter">
                        <div class="filter-title">武器星级</div>
                        <div class="star-filter-options" id="starFilter"></div>
                    </div>

                
                <!-- 武器类别（隐藏） -->
                <div class="filter-card compact-filter" style="display:none;">
                    <div class="filter-title">武器类别</div>
                    <div class="star-filter-options" id="categoryFilter"></div>
                </div>
                
                <!-- 重置按钮 -->
                <button class="reset-btn" onclick="resetFilters()" style="width:100%">重置筛选</button>
        <div class="usage-instruction" style="display:none;">
            <h3>刻写模式使用说明</h3>
            <ul>
                <li>建议从右往左的顺序：武器➡淤积点➡基础属性；切换属性➡淤积点➡基础属性</li>
                <li>其他顺序：选3个基础属性➡选1个附加属性或技能属性➡选1个淤积点</li>
                <li>顺序不同不影响结果</li>
            </ul>
        </div>
            </div>
            
            <!-- 右侧结果面板 -->
            <div class="results-panel">
                <div class="results-header">
                    <div class="results-count-row">
                        <div class="results-count">找到 <span class="number" id="resultCount">0</span> 把武器</div>
                    </div>
                </div>
                <div class="results-grid" id="resultsGrid"></div>
                
               </div>
             </div>

        
        <div class="version-info">游戏版本：公测<br/>森空岛 <a href="https://wiki.skland.com/endfield/catalog?typeMainId=1&typeSubId=2" onclick="window.open(this.href); return false;">WIKI</a><br/>bilibili up <a href="https://space.bilibili.com/1893060527" onclick="window.open(this.href); return false;">辣椒酱</a></div>

    </div>
